<!DOCTYPE html>
<html>
<head>
<title>TradeBot</title>
<style>
body { font-family: Arial; background: #1a1a1a; color: white; padding: 20px; }
.container { max-width: 500px; margin: auto; }
.card { background: #2a2a2a; padding: 20px; border-radius: 10px; margin: 10px 0; }
.button { background: #00aa00; color: white; padding: 15px; border: none; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 5px 0; }
.button:hover { background: #00dd00; }
.info { display: flex; justify-content: space-between; padding: 10px 0; }
h2 { color: #00ff00; }
</style>
</head>
<body>
<div class="container">
<h1>TradeBot Pro</h1>
<h3>Account: $100,000 | Daily Target: $400-500</h3>

<div class="card">
<h2>Select Stock</h2>
<select id="stock" style="width:100%; padding:10px; font-size:16px;">
<option>MSFT - $425</option>
<option>TSLA - $248</option>
<option>AAPL - $182</option>
<option>NVDA - $875</option>
<option>SPY - $512</option>
</select>
</div>

<div class="card">
<h2>Today's Progress</h2>
<div class="info">
<span>Daily Target:</span>
<span style="color: #00ff00;">$400 - $500</span>
</div>
<div class="info">
<span>Current P&L:</span>
<span id="pnl" style="color: #ff0000;">$0</span>
</div>
<div style="width:100%; height:20px; background:#444; border-radius:5px; margin:10px 0;">
<div id="progress" style="width:0%; height:100%; background:#00ff00; border-radius:5px;"></div>
</div>
</div>

<div class="card">
<h2>Trading Signals</h2>
<p id="signal" style="font-size:18px; color:#ffff00;">Waiting for analysis...</p>
<p>Entry Price: <span id="entry">-</span></p>
<p>Stop Loss: <span id="stop">-</span></p>
<p>Target: <span id="target">-</span></p>
<p>Shares to Buy: <span id="shares">-</span></p>
</div>

<button class="button" onclick="analyzeTrade()">ANALYZE NOW</button>
<button class="button" onclick="buySignal()" style="background: #0066ff;">BUY SIGNAL</button>
<button class="button" onclick="sellSignal()" style="background: #ff6600;">SELL SIGNAL</button>

</div>

<script>
function analyzeTrade() {
  const stocks = {
    'MSFT - $425': { price: 425, risk: 12, target: 18 },
    'TSLA - $248': { price: 248, risk: 8, target: 13 },
    'AAPL - $182': { price: 182, risk: 6, target: 10 },
    'NVDA - $875': { price: 875, risk: 25, target: 40 },
    'SPY - $512': { price: 512, risk: 15, target: 24 }
  };
  
  const selected = document.getElementById('stock').value;
  const stock = stocks[selected];
  const sharesToBuy = Math.floor(400 / (stock.price * 0.01));
  
  document.getElementById('entry').textContent = '$' + stock.price;
  document.getElementById('stop').textContent = '$' + (stock.price - stock.risk);
  document.getElementById('target').textContent = '$' + (stock.price + stock.target);
  document.getElementById('shares').textContent = sharesToBuy + ' shares';
  document.getElementById('signal').textContent = '✓ BUY SIGNAL - Good Setup';
  document.getElementById('signal').style.color = '#00ff00';
}

function buySignal() {
  alert('BUY ORDER PLACED\nRemember: Set your stop loss immediately!');
}

function sellSignal() {
  alert('SELL ORDER CLOSED\nCheck your profit!');
}
</script>

</body>
</html>
